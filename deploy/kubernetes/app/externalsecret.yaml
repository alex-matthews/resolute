---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: resolute
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: resolute-secret
    template:
      data:
        RESOLUTE_SEERR__API_KEY: "{{ .SEERR_API_KEY }}"
        RESOLUTE_SONARR__API_KEY: "{{ .SONARR_API_KEY }}"
        RESOLUTE_JUDGE__API_KEY: "{{ .RESOLUTE_MODEL_API_KEY }}"
        RESOLUTE_SEERR__WEBHOOK_SHARED_SECRET: "{{ .RESOLUTE_WEBHOOK_SECRET }}"
        RESOLUTE_EXECUTE_TOKEN: "{{ .RESOLUTE_EXECUTE_TOKEN }}"
        RESOLUTE_API_TOKEN: "{{ .RESOLUTE_API_TOKEN }}"
  dataFrom:
    - extract:
        key: seerr
    - extract:
        key: sonarr
    - extract:
        key: resolute
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
# Scoped secret for the review CronJob: it only calls the resolute API, so it
# gets the api token alone — never the Seerr/Sonarr/judge credentials.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: resolute-review
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: resolute-review-secret
    template:
      data:
        RESOLUTE_API_TOKEN: "{{ .RESOLUTE_API_TOKEN }}"
  dataFrom:
    - extract:
        key: resolute
