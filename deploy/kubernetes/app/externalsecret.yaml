---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tv-decider
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: tv-decider-secret
    template:
      data:
        TVD_SEERR__API_KEY: "{{ .SEERR_API_KEY }}"
        TVD_SONARR__API_KEY: "{{ .SONARR_API_KEY }}"
        TVD_JUDGE__API_KEY: "{{ .TV_DECIDER_MODEL_API_KEY }}"
        TVD_SEERR__WEBHOOK_SHARED_SECRET: "{{ .TV_DECIDER_WEBHOOK_SECRET }}"
        TVD_EXECUTE_TOKEN: "{{ .TV_DECIDER_EXECUTE_TOKEN }}"
  dataFrom:
    - extract:
        key: seerr
    - extract:
        key: sonarr
    - extract:
        key: tv-decider
