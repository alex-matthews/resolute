---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: resolute
spec:
  chartRef:
    kind: OCIRepository
    name: resolute
  interval: 1h
  values:
    controllers:
      resolute:
        # SQLite single-writer: keep exactly 1 replica and 1 uvicorn worker
        # (the default `resolute serve` runs one worker). Do not scale this.
        replicas: 1
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              # Build/push from this repo's Dockerfile; pin by digest once published.
              repository: ghcr.io/alex-matthews/resolute
              tag: 0.1.0
            env:
              TZ: Pacific/Auckland
              RESOLUTE_MODE: shadow          # rollout: shadow -> recommend -> approve
              RESOLUTE_ALLOW_WRITES: "false" # master write switch; keep false until docs/rollout.md phase 3
              RESOLUTE_AUTO_APPROVE_ENABLED: "false"
              RESOLUTE_DB_PATH: /data/resolute.db
              RESOLUTE_POLICY_PATH: /config/policy.yaml
              # Ports follow the config defaults (org convention): app 8080,
              # /metrics on its own 8081 listener. No override needed.
              RESOLUTE_SEERR__URL: http://seerr.default.svc.cluster.local
              RESOLUTE_SONARR__URL: http://sonarr.default.svc.cluster.local
              RESOLUTE_SEERR__PROFILE_NAME_1080P: HD-1080p   # match your Sonarr profile names exactly
              RESOLUTE_SEERR__PROFILE_NAME_2160P: Ultra-HD
              RESOLUTE_JUDGE__ENABLED: "false"
              RESOLUTE_JUDGE__BASE_URL: http://litellm.default.svc.cluster.local/v1
            envFrom:
              - secretRef:
                  name: resolute-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: &port 8080
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /readyz
                    port: *port
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 256Mi
      # Scheduled library review: nightly sweep of pending Seerr TV requests,
      # via the API so the SQLite writer and its RWO PVC stay with the API pod.
      # The endpoint only decides and records; it never executes writes.
      review:
        type: cronjob
        cronjob:
          schedule: "0 4 * * *"
          successfulJobsHistory: 1
          failedJobsHistory: 1
        containers:
          app:
            image:
              repository: ghcr.io/alex-matthews/resolute
              tag: 0.1.0
            command:
              - python
              - -c
              - |
                import os, httpx
                headers = {}
                if os.environ.get("RESOLUTE_API_TOKEN"):
                    headers["X-Resolute-Api-Token"] = os.environ["RESOLUTE_API_TOKEN"]
                r = httpx.post(
                    "http://resolute.default.svc.cluster.local/api/reviews/pending",
                    headers=headers,
                    timeout=300,
                )
                r.raise_for_status()
                print(r.text)
            envFrom:
              # Least privilege: the review job only talks to the API, so it
              # gets only the api token — not the Seerr/Sonarr/judge keys.
              - secretRef:
                  name: resolute-review-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1032
        runAsGroup: 100
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: resolute
        ports:
          http:
            port: 80
            targetPort: *port
          # Dedicated metrics listener, exposed for the in-cluster scraper.
          metrics:
            port: 8081
    # Internal-only: Seerr reaches resolute in-cluster; no external route needed.
    persistence:
      data:
        existingClaim: resolute
        advancedMounts:
          resolute:
            app:
              - path: /data
      policy:
        type: configMap
        name: resolute-policy
        advancedMounts:
          resolute:
            app:
              - path: /config/policy.yaml
                subPath: policy.yaml
                readOnly: true
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
