---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tv-decider
spec:
  chartRef:
    kind: OCIRepository
    name: tv-decider
  interval: 1h
  values:
    controllers:
      tv-decider:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              # Build/push from this repo's Dockerfile; pin by digest once published.
              repository: ghcr.io/alex-matthews/tv-decider
              tag: 0.1.0
            env:
              TZ: Pacific/Auckland
              TVD_MODE: shadow          # rollout: shadow -> recommend -> approve
              TVD_ALLOW_WRITES: "false" # master write switch; keep false until docs/rollout.md phase 3
              TVD_AUTO_APPROVE_ENABLED: "false"
              TVD_DB_PATH: /data/tv-decider.db
              TVD_POLICY_PATH: /config/policy.yaml
              TVD_LISTEN_PORT: &port 8130
              TVD_SEERR__URL: http://seerr.default.svc.cluster.local
              TVD_SONARR__URL: http://sonarr.default.svc.cluster.local
              TVD_SEERR__PROFILE_NAME_1080P: HD-1080p   # match your Sonarr profile names exactly
              TVD_SEERR__PROFILE_NAME_2160P: Ultra-HD
              TVD_JUDGE__ENABLED: "false"
              TVD_JUDGE__BASE_URL: http://litellm.default.svc.cluster.local/v1
            envFrom:
              - secretRef:
                  name: tv-decider-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: *port
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /readyz
                    port: *port
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 256Mi
      # Scheduled library review: nightly shadow audit of pending requests + drift.
      review:
        type: cronjob
        cronjob:
          schedule: "0 4 * * *"
          successfulJobsHistory: 1
          failedJobsHistory: 1
        containers:
          app:
            image:
              repository: ghcr.io/alex-matthews/tv-decider
              tag: 0.1.0
            command: ["tv-decider", "review-pending"]
            env:
              TVD_MODE: shadow
              TVD_DB_PATH: /data/tv-decider.db
              TVD_POLICY_PATH: /config/policy.yaml
              TVD_SEERR__URL: http://seerr.default.svc.cluster.local
              TVD_SONARR__URL: http://sonarr.default.svc.cluster.local
            envFrom:
              - secretRef:
                  name: tv-decider-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1032
        runAsGroup: 100
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: tv-decider
        ports:
          http:
            port: *port
    # Internal-only: Seerr reaches tv-decider in-cluster; no external route needed.
    persistence:
      data:
        existingClaim: tv-decider
        advancedMounts:
          tv-decider:
            app:
              - path: /data
          review:
            app:
              - path: /data
      policy:
        type: configMap
        name: tv-decider-policy
        globalMounts:
          - path: /config/policy.yaml
            subPath: policy.yaml
            readOnly: true
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
