---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# Setup dependency (home-operations pattern, works on a personal account):
# requires BOT_CLIENT_ID / BOT_APP_PRIVATE_KEY secrets for a GitHub App you
# own, plus a `.github` repo under the same account running a dispatchable
# self-hosted Renovate workflow (renovate.yaml with an autodiscoverFilter
# input). If you install the Mend-hosted Renovate App on this repo instead,
# delete this workflow — .renovaterc.json5 is picked up automatically.
name: Renovate

on:
  push:
    branches:
      - main
    paths:
      - .renovaterc.json5
  workflow_dispatch:

permissions: {}

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-24.04
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.BOT_CLIENT_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ".github"
          permission-actions: write

      - name: Run Renovate
        id: dispatch
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          RUN_URL=$(gh workflow run renovate.yaml \
            --repo "${OWNER}/.github" \
            --ref main \
            --field "autodiscoverFilter=${REPO_NAME}")
          echo "run_id=${RUN_URL##*/}" >> "$GITHUB_OUTPUT"

      - name: Await Renovate Completion
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          OWNER: ${{ github.repository_owner }}
          RUN_ID: ${{ steps.dispatch.outputs.run_id }}
        run: gh run watch --repo "${OWNER}/.github" "${RUN_ID}" --exit-status
