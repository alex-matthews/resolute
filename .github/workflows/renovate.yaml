---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# Direct self-hosted Renovate run against this repo. Requires secrets for a
# GitHub App you own (personal accounts can own apps) installed on this repo
# with contents/pull-requests/issues/statuses/workflows write and administration/checks read:
# BOT_APP_CLIENT_ID and BOT_APP_PRIVATE_KEY. Repository-level Renovate config
# stays in .renovaterc.json5 and is read by Renovate itself.
name: Renovate

on:
  push:
    branches:
      - main
    paths:
      - .renovaterc.json5
      - .github/workflows/renovate.yaml
  schedule:
    - cron: 0 */6 * * *
  workflow_dispatch:
    inputs:
      dryRun:
        description: Dry run mode
        default: "false"
        required: false
      logLevel:
        description: Log level
        default: info
        required: false

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions: {}

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-24.04
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.BOT_APP_CLIENT_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          permission-administration: read
          permission-checks: read
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
          permission-statuses: write
          permission-workflows: write

      - name: Run Renovate
        uses: renovatebot/github-action@3064367f740a1a91cca218698a63902689cce200 # v46.1.20
        with:
          token: ${{ steps.app-token.outputs.token }}
        env:
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
          # mise lockfile refresh: Renovate must run `mise lock`, which it
          # gates as an unsafe execution, and mise itself must trust the
          # checked-out config (same pair the home-operations runner sets).
          RENOVATE_ALLOWED_UNSAFE_EXECUTIONS: '["mise"]'
          RENOVATE_AUTODISCOVER: "false"
          RENOVATE_CUSTOM_ENV_VARIABLES: '{"MISE_TRUSTED_CONFIG_PATHS":"/tmp/renovate/repos"}'
          RENOVATE_DRY_RUN: ${{ inputs.dryRun == 'true' && 'full' || null }}
          RENOVATE_ONBOARDING: "false"
          RENOVATE_PLATFORM: github
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_REQUIRE_CONFIG: required
