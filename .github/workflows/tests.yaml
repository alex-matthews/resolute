---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Tests

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Python Tests
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          experimental: true
          install_args: --locked

      - name: Check lockfile is current
        run: uv lock --check

      - name: Install locked dependencies
        run: mise run sync

      - name: Run unit tests
        run: mise run test

      - name: Run golden decision fixtures
        run: mise run golden

  build:
    name: Container Build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # Packaging gate: catches Dockerfile/lockfile breaks before merge. The
      # multi-arch signed build still happens on main via the release workflow.
      - name: Build image (no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: false
          load: true
          tags: resolute:ci
          platforms: linux/amd64

      # Run the image the way the cluster will: arbitrary uid 1032:100,
      # read-only rootfs, no HOME, only /data writable, policy mounted ro.
      - name: Kubernetes-constraint smoke
        env:
          IMAGE: resolute:ci
          IMAGE_PREBUILT: "1"
        run: bash scripts/k8s-smoke.sh
