---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Manifests

on:
  push:
    branches:
      - main
    paths:
      - deploy/**
      - scripts/kubeconform.sh
      - .mise/config.toml
      - .github/workflows/manifests.yaml
  pull_request:
    branches:
      - main
    paths:
      - deploy/**
      - scripts/kubeconform.sh
      - .mise/config.toml
      - .github/workflows/manifests.yaml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  kubeconform:
    name: Helm Render + Kubeconform
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          experimental: true
          install_args: --locked

      - name: Render app-template and validate manifests
        run: mise run kubeconform
