---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Manifests

on:
  push:
    branches:
      - main
    paths:
      - deploy/**
      - scripts/kubeconform.sh
      - .mise/config.toml
      - .github/workflows/manifests.yaml
  pull_request:
    branches:
      - main
    paths:
      - deploy/**
      - scripts/kubeconform.sh
      - .mise/config.toml
      - .github/workflows/manifests.yaml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  kubeconform:
    name: Helm Render + Kubeconform
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          experimental: true
          install_args: --locked

      - name: Render app-template and validate manifests
        run: mise run kubeconform
