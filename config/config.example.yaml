# resolute service configuration.
# Every key can also be set via env vars: RESOLUTE_MODE, RESOLUTE_SEERR__API_KEY,
# RESOLUTE_JUDGE__ENABLED, ... (env vars win over this file).

# Automation mode: shadow | recommend | approve | auto_profile | auto_approve
# Start with shadow. See docs/rollout.md before changing.
mode: shadow

# Master write switch. Even auto_* modes cannot write while this is false.
allow_writes: false

# auto_approve additionally requires this explicit opt-in.
auto_approve_enabled: false

# Required for POST /api/decisions/{id}/execute (sent as X-Resolute-Operator-Token).
# While empty, HTTP-mediated execution is disabled; `resolute execute` still works.
execute_token: ""

# Optional bearer for all other /api/* endpoints (sent as X-Resolute-Api-Token).
# The webhook keeps its own shared secret; health/ready/metrics stay open.
# Recommended once the judge is enabled, since decision endpoints can spend money.
api_token: ""

db_path: data/resolute.db
policy_path: config/policy.yaml

listen_host: 0.0.0.0
listen_port: 8130
log_level: INFO

seerr:
  url: http://seerr.default.svc.cluster.local
  api_key: ""            # set via RESOLUTE_SEERR__API_KEY / ExternalSecret
  # The two existing Sonarr quality profiles, exactly as Seerr shows them.
  # resolute selects between these; it never creates or edits profiles.
  profile_name_1080p: "HD-1080p"
  profile_name_2160p: "Ultra-HD"
  # MEDIA_PENDING requests can be decided and (in write modes) updated/approved.
  # MEDIA_AUTO_APPROVED requests have already routed to Sonarr: they only ever
  # produce audit/fallback plans, never Seerr writes (enforced by the planner).
  trigger_notification_types: ["MEDIA_PENDING", "MEDIA_AUTO_APPROVED"]
  # If set, the Seerr webhook must send this value in the X-Resolute-Token header.
  # Mandatory for auto_profile/auto_approve with allow_writes: the service
  # refuses to start an unauthenticated write-capable webhook.
  webhook_shared_secret: ""

sonarr:
  url: http://sonarr.default.svc.cluster.local
  api_key: ""            # optional; enables shadow-delta, audit, and fallback planning

judge:
  enabled: false          # deterministic-only until you opt in
  provider: openai_compat # any OpenAI-compatible gateway (LiteLLM recommended)
  base_url: http://litellm.default.svc.cluster.local/v1
  api_key: ""
  model: claude-haiku-4-5
  timeout_seconds: 30
  judge_ambiguous_only: true  # only consult the model inside the ambiguous score band

# ADR-0002 downgrade executor (Costanza retention seam). Report-only until
# admin_confirm_enabled AND allow_writes are both true.
downgrade:
  admin_confirm_enabled: false
  # Must be a profile whose quality list EXCLUDES 2160p (the executor verifies).
  target_profile_name: "HD-1080p"
  max_decision_age_days: 7
